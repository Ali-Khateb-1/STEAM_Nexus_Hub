<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ali Khateb - STEAM Nexus Hub</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #111;
            color: #f0f0f0;
            margin: 0;
            padding: 0;
            text-align: center;
        }
        .container {
            max-width: 800px;
            margin: auto;
            padding: 60px;
        }
        .title {
            font-size: 2.8em;
            color: #00c0ff;
            font-weight: bold;
        }
        .subtitle {
            font-size: 1.5em;
            margin-top: 20px;
        }
        .btn {
            display: inline-block;
            background-color: #007ACC;
            color: white;
            padding: 12px 20px;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            font-size: 18px;
            margin-top: 30px;
            text-decoration: none;
        }
        .btn:hover {
            background-color: #005A8D;
        }
        .copy-container {
            margin-top: 40px;
        }
        .copy-field {
            padding: 10px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            text-align: center;
            width: 100%;
            max-width: 400px;
            background: #222;
            color: white;
        }
        .copy-btn {
            background-color: #00c0ff;
            color: #111;
            padding: 10px 15px;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            font-size: 16px;
            margin-top: 10px;
        }
        .copy-btn:hover {
            background-color: #0085cc;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="title">Ali Khateb - STEAM Nexus Hub 🚀</div>
    <div class="subtitle">Where Innovation Meets Engineering & AI</div>

    <p>Bringing together industrial expertise, AI development, and digital fabrication to create cutting-edge solutions.</p>
    
    <!-- الزر الرئيسي ينقل إلى صفحة العرض -->
    <a href="https://ali-khateb-1.github.io/STEAM_Nexus_Hub/" class="btn">Visit STEAM Nexus Hub</a>

    <div class="copy-container">
        <p>Copy the GitHub repository link:</p>
        <input type="text" value="https://github.com/Ali-Khateb-1/STEAM_Nexus_Hub.git" id="repoLink" class="copy-field" readonly>
        <button class="copy-btn" onclick="copyLink()">Copy</button>
    </div>

    <p>Stay tuned for updates and projects!</p>
</div>

<script>
    function copyLink() {
        var copyText = document.getElementById("repoLink");
        copyText.select();
        navigator.clipboard.writeText(copyText.value);
        alert("Copied successfully!");
    }
</script>

</body>
</html>
